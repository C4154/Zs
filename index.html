<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Školní testy</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#f0f2f5;--paper:#fff;--text:#1a1a2e;--muted:#6c757d;--b:#dee2e6;--pr:#4361ee;--ok:#2ecc71;--r:12px}
[data-theme="dark"]{--bg:#0f0f1a;--paper:#1a1a2e;--text:#e0e0e0;--muted:#a0a0a0;--b:#2d2d44}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.wrap{max-width:800px;margin:0 auto;padding:20px 16px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--b)}
h1{font-size:1.4rem}
.btn{padding:14px 20px;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
.btn:hover{opacity:.9}.btn-pr{background:var(--pr);color:#fff}.btn-gr{background:var(--bg);border:2px solid var(--b);color:var(--text)}
.box{background:var(--paper);border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--b);padding:24px;margin-bottom:14px}
.c{text-align:center}.s{font-size:.9rem;color:var(--muted)}.mt{margin-top:12px}.hide{display:none!important}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.cat-card{padding:22px 10px;background:var(--paper);border:2px solid var(--b);border-radius:var(--r);text-align:center;cursor:pointer}
.cat-card:hover{border-color:var(--pr)}.cat-card .e{font-size:2.2rem;margin-bottom:6px}.cat-card .n{font-weight:700}.cat-card .c2{font-size:.8rem;color:var(--muted)}
.test-item{display:flex;justify-content:space-between;align-items:center;padding:18px;background:var(--paper);border:2px solid var(--b);border-radius:var(--r);margin-bottom:10px;cursor:pointer}
.test-item:hover{border-color:var(--pr)}.test-item .t{font-weight:700;font-size:1.1rem;margin-bottom:4px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;background:var(--bg);color:var(--muted);margin-right:4px}
.tag.bl{background:#e3f2fd;color:#1565c0}
.progress{height:8px;background:var(--b);border-radius:4px;margin-bottom:20px;overflow:hidden}
.progress>div{height:100%;background:linear-gradient(90deg,var(--pr),#4895ef);transition:width .3s}
.q-text{font-size:1.25rem;font-weight:700;margin-bottom:20px}
.option{display:block;width:100%;padding:16px;margin-bottom:10px;background:var(--paper);border:2px solid var(--b);border-radius:var(--r);font-size:1.05rem;cursor:pointer;text-align:left}
.option:hover{border-color:#4895ef}.option.picked{border-color:var(--pr);background:rgba(67,97,238,.08);font-weight:700}
.res-circle{width:150px;height:150px;border-radius:50%;border:8px solid var(--ok);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}
.res-pct{font-size:2.8rem;font-weight:800}
.th{background:var(--paper);border:2px solid var(--b);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem}
@media(max-width:480px){.cat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
<div class="header"><h1>🎓 Školní testy</h1><button class="th" onclick="toggleTheme()">🌓</button></div>

<div id="p-home"><div class="box c"><div style="font-size:3rem;margin-bottom:12px">👨‍🎓</div><h2 class="mt">Procvičování</h2><p class="s mt">Vyber předmět a zkus test. Bez přihlašování.</p><button class="btn btn-pr mt" onclick="loadAndGo()">Začít</button></div></div>

<div id="p-cats" class="hide"><div class="c mb"><h2>Vyber předmět</h2><p class="s" id="load-msg">Načítání...</p></div><div class="cat-grid" id="g-cats"></div><button class="btn btn-gr" onclick="go('home')">Zpět</button></div>

<div id="p-list" class="hide"><div class="c mb"><h2 id="l-title">Testy</h2><p class="s" id="l-sub"></p></div><div id="g-list"></div><button class="btn btn-gr mt" onclick="go('cats')">← Předměty</button></div>

<div id="p-test" class="hide"><div class="progress"><div id="prog" style="width:0%"></div></div><div class="box"><div class="s" style="text-transform:uppercase;font-size:.75rem;margin-bottom:6px">Otázka <span id="q-cur">1</span> / <span id="q-tot">5</span></div><div class="q-text" id="q-txt"></div><div id="q-opt"></div></div><div style="display:flex;gap:10px"><button class="btn btn-gr" onclick="prev()" id="b-prev" style="flex:1">←</button><button class="btn btn-pr" onclick="next()" id="b-next" style="flex:1">Další →</button></div></div>

<div id="p-res" class="hide"><div class="box c"><div class="res-circle"><div class="res-pct" id="r-pct">0%</div></div><div style="font-size:1.1rem"><strong id="r-cnt">0 / 0</strong> správně</div><p class="s mt" id="r-msg"></p></div><div class="box"><h3 class="mb">Srovnání</h3><p>Průměr: <strong id="r-avg">-</strong></p><p class="s mt" id="r-cmp"></p></div><button class="btn btn-pr mt" onclick="go('cats')">Další test</button></div>
</div>

<script>
const cfg={apiKey:"AIzaSyCsEtg1GEGDbZDawmLk-sfQfdauHFJaiko",authDomain:"diar-4f2e8.firebaseapp.com",projectId:"diar-4f2e8",storageBucket:"diar-4f2e8.firebasestorage.app",messagingSenderId:"19490498944",appId:"1:19490498944:web:733ab182f3a1e09483f965"};
let db, subjects=[], tests=[], results=[];

try{firebase.initializeApp(cfg);db=firebase.firestore();console.log("Firebase OK")}catch(e){alert("Firebase chyba: "+e.message)}

function toggleTheme(){const h=document.documentElement,t=h.getAttribute('data-theme')=='light'?'dark':'light';h.setAttribute('data-theme',t);localStorage.setItem('theme',t)}
(function(){const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t)})();

function go(p){document.querySelectorAll('[id^="p-"]').forEach(e=>e.classList.add('hide'));document.getElementById('p-'+p).classList.remove('hide');window.scrollTo(0,0)}

// VŽDY načítá z Firebase, ne z LocalStorage
async function loadAndGo(){go('cats');document.getElementById('load-msg').textContent='Načítání...';await loadData();renderCats()}

async function loadData(){
    if(!db){document.getElementById('load-msg').textContent='Offline - žádná data';return}
    try{
        const[snap,tsnap,rsnap]=await Promise.all([
            db.collection('subjects').get(),
            db.collection('tests').get(),
            db.collection('results').get()
        ]);
        subjects=snap.docs.map(d=>({id:d.id,...d.data()}));
        tests=tsnap.docs.map(d=>({id:d.id,...d.data()}));
        results=rsnap.docs.map(d=>({id:d.id,...d.data()}));
        document.getElementById('load-msg').textContent=subjects.length?`${subjects.length} předmětů, ${tests.length} testů`:'Žádná data - učitelka musí přidat testy';
    }catch(e){console.error(e);document.getElementById('load-msg').textContent='Chyba načítání';}
}

function renderCats(){
    const g=document.getElementById('g-cats');
    if(!subjects.length){g.innerHTML='<p class="c s">Zatím žádné předměty.</p>';return}
    g.innerHTML=subjects.map(x=>{
        const c=tests.filter(t=>t.subject==x.id||(t.subject&&t.subject.id==x.id)).length;
        return`<div class="cat-card" onclick="pick('${x.id}','${x.n||x.name}')"><div class="e">${x.e||x.emoji||'📖'}</div><div class="n">${x.n||x.name}</div><div class="c2">${c} testů</div></div>`
    }).join('');
}

function pick(id,name){
    const t=tests.filter(x=>x.subject==id||(x.subject&&x.subject.id==id));
    document.getElementById('l-title').textContent=name;
    document.getElementById('l-sub').textContent=t.length+' testů';
    document.getElementById('g-list').innerHTML=t.length?t.map(x=>`<div class="test-item" onclick="start('${x.id}')"><div><div class="t">${x.title}</div><div class="s mt"><span class="tag bl">${x.class}</span><span class="tag">${x.questions.length} otázek</span></div></div><div style="font-size:1.4rem;color:var(--muted)">›</div></div>`).join(''):'<p class="c s">Zatím nic.</p>';
    go('list');
}

let st={test:null,qs:[],ans:[],i:0};
function start(id){
    const t=tests.find(x=>x.id==id);
    if(!t)return;
    st={test:t,qs:t.shuffle?[...t.questions].sort(()=>Math.random()-.5):[...t.questions],ans:new Array(t.questions.length).fill(null),i:0};
    go('test');rq();
}
function rq(){
    const q=st.qs[st.i],tot=st.qs.length;
    document.getElementById('q-cur').textContent=st.i+1;
    document.getElementById('q-tot').textContent=tot;
    document.getElementById('prog').style.width=((st.i+1)/tot*100)+'%';
    document.getElementById('q-txt').textContent=q.q;
    document.getElementById('q-opt').innerHTML=q.o.map((t,i)=>`<button class="option ${st.ans[st.i]==i?'picked':''}" onclick="ans(${i})">${String.fromCharCode(65+i)}. ${t}</button>`).join('');
    document.getElementById('b-prev').style.visibility=st.i==0?'hidden':'visible';
    document.getElementById('b-next').textContent=st.i==tot-1?'Dokončit ✓':'Další →';
}
function ans(i){st.ans[st.i]=i;rq()}
function next(){if(st.ans[st.i]===null){alert('Vyber odpověď');return}if(st.i<st.qs.length-1){st.i++;rq()}else fin()}
function prev(){if(st.i>0){st.i--;rq()}}

async function fin(){
    let ok=0;st.qs.forEach((q,i)=>{if(st.ans[i]==q.a)ok++});
    const tot=st.qs.length,pct=Math.round(ok/tot*100);
    const r={testId:st.test.id,name:'Žák',score:pct,correct:ok,total:tot,date:Date.now()};
    // Uložit do Firebase
    if(db)try{await db.collection('results').add(r);results.push(r)}catch(e){console.error(e)}
    document.getElementById('r-pct').textContent=pct+'%';
    document.getElementById('r-cnt').textContent=ok+' / '+tot;
    const msgs=[{min:90,t:'Výborně! 🌟'},{min:70,t:'Chytrá hlava! 👍'},{min:50,t:'Není to špatné. 📚'},{min:0,t:'Zkus to znovu! 💪'}];
    document.getElementById('r-msg').textContent=msgs.find(m=>pct>=m.min).t;
    const all=results.filter(x=>x.testId==st.test.id);
    const avg=all.length?Math.round(all.reduce((a,b)=>a+b.score,0)/all.length):pct;
    document.getElementById('r-avg').textContent=avg+'%';
    const d=pct-avg,e=document.getElementById('r-cmp');
    if(d>=10)e.textContent='Jsi nad průměrem o '+d+' %.';
    else if(d<=-10)e.textContent='Průměr je o '+Math.abs(d)+' % vyšší.';
    else e.textContent='Jsi těsně u průměru.';
    go('res');
}
</script>
</body>
</html>
